name: CI - Build, Test and E2E Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────
  # Unit tests + build (runs on Linux, fast)
  # ─────────────────────────────────────────────────────────
  build-and-test:
    name: Build and Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint

      - name: Run unit tests
        run: npx vitest run --reporter=verbose 2>&1 | tee test-output.txt

      - name: Run build
        run: npm run build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 5

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-output
          path: test-output.txt
          retention-days: 5

  # ─────────────────────────────────────────────────────────
  # E2E: Linux packages (ubuntu runner)
  # ─────────────────────────────────────────────────────────
  e2e-linux:
    name: E2E Linux Packages
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      E2E_OUTPUT: /tmp/mc-e2e
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Ubuntu GH runners already have pwsh installed
      - name: Verify PowerShell
        run: pwsh --version

      # Create GuestConfig directory (gc_worker needs it writable)
      - name: Prepare GuestConfig directory
        run: |
          sudo mkdir -p /var/lib/GuestConfig
          sudo chmod 777 /var/lib/GuestConfig

      # Generate test configurations from schemas + templates
      - name: Generate test configs
        run: npx tsx e2e/generate-test-configs.ts

      # Run E2E validation - builds packages and evaluates with real DSC engine
      - name: Validate Linux packages
        run: pwsh -File e2e/validate-packages.ps1 -InputDir /tmp/mc-e2e -TargetPlatform Linux

      - name: Upload built packages
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: linux-packages
          path: /tmp/mc-e2e/**/output/*.zip
          retention-days: 5
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────
  # E2E: Windows packages (windows runner)
  # ─────────────────────────────────────────────────────────
  e2e-windows:
    name: E2E Windows Packages
    runs-on: windows-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Generate test configurations
      - name: Generate test configs
        shell: pwsh
        run: |
          $env:E2E_OUTPUT = Join-Path $env:RUNNER_TEMP 'mc-e2e'
          npx tsx e2e/generate-test-configs.ts

      # Run E2E validation
      - name: Validate Windows packages
        shell: pwsh
        run: |
          $inputDir = Join-Path $env:RUNNER_TEMP 'mc-e2e'
          & .\e2e\validate-packages.ps1 -InputDir $inputDir -TargetPlatform Windows

      - name: Upload built packages
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-packages
          path: ${{ runner.temp }}/mc-e2e/**/output/*.zip
          retention-days: 5
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────
  # Summary — posts a PR comment with test results
  # ─────────────────────────────────────────────────────────
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [build-and-test, e2e-linux, e2e-windows]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Post summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const jobs = [
              { name: 'Build & Unit Tests', result: '${{ needs.build-and-test.result }}' },
              { name: 'E2E Linux Packages', result: '${{ needs.e2e-linux.result }}' },
              { name: 'E2E Windows Packages', result: '${{ needs.e2e-windows.result }}' },
            ];
            const icon = r => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';
            const allPassed = jobs.every(j => j.result === 'success');
            const rows = jobs.map(j => `| ${icon(j.result)} | ${j.name} | ${j.result} |`).join('\n');
            const body = [
              `## ${allPassed ? '✅' : '❌'} CI Results`,
              '',
              '| | Job | Status |',
              '|---|-----|--------|',
              rows,
              '',
              allPassed
                ? '**All checks passed.** Unit tests, lint, build, and E2E package validation on both Linux and Windows.'
                : '**Some checks failed.** See the workflow run for details.',
              '',
              `<sub>Run: [${context.runId}](${context.payload.repository.html_url}/actions/runs/${context.runId})</sub>`,
            ].join('\n');

            // Find existing bot comment to update
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes('## ✅ CI Results') || c.body?.includes('## ❌ CI Results'));

            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }

      - name: Write job summary
        if: always()
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Unit Tests | ${{ needs.build-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Linux Packages | ${{ needs.e2e-linux.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Windows Packages | ${{ needs.e2e-windows.result }} |" >> $GITHUB_STEP_SUMMARY
